# 最简版 Vue 部署到 GitHub Pages 工作流
name: Deploy Vue to GitHub Pages

# 只监听你的默认分支（改成你的分支名，比如「主要角色」）
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 允许手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write       # 授予 Pages 部署权限
      id-token: write    # 授予 ID 令牌权限
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 缓存依赖，加速构建

      # 3. 安装依赖
      - name: Install dependencies
        run: npm install

      # 4. 打包 Vue 项目
      - name: Build Vue project
        run: npm run build

      # 5. 上传产物（只执行 1 次！核心：避免多产物）
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist # Vue 打包输出目录，必须正确

      # 6. 部署到 Pages（只执行 1 次！）
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
